# .github/workflows/build-apk.yml
name: Build Flet APK

on:
  # 当你推送代码到 main 或 master 分支时自动触发
  push:
    branches: [ main, master ]
  # 允许你从 GitHub 网页手动点击运行
  workflow_dispatch:name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v5

    - name: 设置 Java 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ env.JAVA_VERSION }}

    - name: 设置 Python 环境
      uses: actions/setup-python@v6      # 升级到 v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        # ⚠️ 注意：这里【没有】cache: 'pip' 这一行！

    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install flet
        fi

    - name: 设置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'
        channel: 'stable'

    - name: 构建 APK
      run: |
        flet build apk \
          --main main.py \
          --icon icon.png \
          --app-name "我的应用" \
          --package com.example.myapp \
          --build-number ${{ env.BUILD_NUMBER }} \
          --build-version ${{ env.BUILD_VERSION }}

    - name: 上传 APK
      uses: actions/upload-artifact@v5
      with:
        name: flet-apk
        path: build/apk/*.apk

env:
  # 指定 Python 版本
  PYTHON_VERSION: '3.11'
  # 指定 Java 版本 (Android 构建需要)
  JAVA_VERSION: '17'
  # 应用版本号 (可选)
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install flet
        fi

    - name: 设置 Java 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ env.JAVA_VERSION }}

    - name: 设置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'
        channel: 'stable'

    - name: 构建 APK
      run: |
        flet build apk \
          --main main.py \
          --icon icon.png \
          --app-name "你的应用名称" \
          --package com.example.myapp \
          --build-number ${{ env.BUILD_NUMBER }} \
          --build-version ${{ env.BUILD_VERSION }}

    - name: 上传 APK 产物
      uses: actions/upload-artifact@v4
      with:
        name: flet-apk
        path: build/apk/*.apk
